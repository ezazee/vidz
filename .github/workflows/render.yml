name: Render Video

on:
  repository_dispatch:
    types: [render_video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Fetch storyboard
        run: node scripts/fetch-storyboard.js
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          PROJECT_ID: ${{ github.event.client_payload.project_id }}

      - name: Generate images
        run: node scripts/generate-images.js
        env:
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}

      - name: Generate voices
        run: node scripts/generate-voices.js
        env:
          TTS_VOICE: ${{ secrets.TTS_VOICE }}

      - name: Render video
        run: |
          mkdir -p output
          npx remotion render src/index.ts StoryZVideo output/final.mp4 --props=storyboard.json --concurrency=2
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload video to Blob storage
        run: node scripts/upload.js
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - name: Update job completed
        if: success()
        run: |
          VIDEO_URL=$(cat output/video_url.txt)
          node scripts/update-job.js --status=completed --video-url="$VIDEO_URL"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          JOB_ID: ${{ github.event.client_payload.job_id }}

      - name: Update job failed
        if: failure()
        run: node scripts/update-job.js --status=failed --error="Render failed. Check Actions logs."
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          JOB_ID: ${{ github.event.client_payload.job_id }}
