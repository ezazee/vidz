name: Render Video

on:
  repository_dispatch:
    types: [render_video]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Fetch storyboard
        run: node scripts/fetch-storyboard.js
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          JOB_ID: ${{ github.event.client_payload.job_id }}
          MODE: ${{ github.event.client_payload.mode }}
          SCENE_IDS: ${{ toJson(github.event.client_payload.scene_ids) }}

      - name: Render video
        run: npx remotion render src/index.ts StoryZVideo output/final.mp4 --props=storyboard.json --concurrency=2

      - name: Upload video to Blob storage
        run: node scripts/upload.js
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - name: Update database completed
        if: success()
        run: node scripts/update-job.js --status=completed --video-url="${VIDEO_URL:-https://example.com/video-placeholder.mp4}"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          JOB_ID: ${{ github.event.client_payload.job_id }}

      - name: Update database failed
        if: failure()
        run: node scripts/update-job.js --status=failed --error="Render job failed. Check GitHub Actions logs."
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          JOB_ID: ${{ github.event.client_payload.job_id }}
