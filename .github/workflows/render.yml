name: Render Video

on:
  repository_dispatch:
    types: [render_video]

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          else
            echo "FFmpeg is already installed: $(ffmpeg -version | head -n 1)"
          fi

      - name: Fetch storyboard
        run: node scripts/fetch-storyboard.js
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          CHANNEL_ID: ${{ github.event.client_payload.channel_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          SCENE_IDS: ${{ github.event.client_payload.scene_ids && join(github.event.client_payload.scene_ids, ',') || '' }}

      - name: Generate images
        run: node scripts/generate-images.js
        env:
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          CHANNEL_ID: ${{ github.event.client_payload.channel_id }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          MINIO_REGION: ${{ secrets.MINIO_REGION }}
          MINIO_PUBLIC_URL: ${{ secrets.MINIO_PUBLIC_URL }}

      - name: Generate voices
        run: node scripts/generate-voices.js
        env:
          TTS_VOICE: ${{ secrets.TTS_VOICE }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          CHANNEL_ID: ${{ github.event.client_payload.channel_id }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          MINIO_REGION: ${{ secrets.MINIO_REGION }}
          MINIO_PUBLIC_URL: ${{ secrets.MINIO_PUBLIC_URL }}

      - name: Prepare chunks
        id: set-matrix
        run: node scripts/prepare-chunks.js

      - name: Upload assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: assets
          path: |
            public/
            storyboard.json
          retention-days: 1

  render:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          else
            echo "FFmpeg is already installed: $(ffmpeg -version | head -n 1)"
          fi

      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          name: assets
          path: .

      - name: Render video chunk
        run: |
          mkdir -p output
          npx remotion render src/index.ts "$COMPOSITION_ID" output/part-${{ matrix.chunk.part }}.mp4 --frames=${{ matrix.chunk.frames }} --props=storyboard.json --concurrency=2 --timeout=120000
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          REMOTION_LOCAL_ASSETS: 'true'
          COMPOSITION_ID: ${{ github.event.client_payload.mode == 'short' && 'StoryZVideoShort' || 'StoryZVideo' }}

      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-part-${{ matrix.chunk.part }}
          path: output/part-${{ matrix.chunk.part }}.mp4
          retention-days: 1

  merge:
    needs: [prepare, render]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          else
            echo "FFmpeg is already installed: $(ffmpeg -version | head -n 1)"
          fi

      - name: Download all video parts
        uses: actions/download-artifact@v4
        with:
          path: .

      - name: Merge video chunks
        run: node scripts/merge-chunks.js

      - name: Upload video to Cloudflare R2
        run: node scripts/upload.js
        env:
          PROJECT_ID: ${{ github.event.client_payload.project_id }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          MINIO_REGION: ${{ secrets.MINIO_REGION }}
          MINIO_PUBLIC_URL: ${{ secrets.MINIO_PUBLIC_URL }}

      - name: Update job completed
        run: |
          VIDEO_URL=$(cat output/video_url.txt)
          node scripts/update-job.js --status=completed --video-url="$VIDEO_URL"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          JOB_ID: ${{ github.event.client_payload.job_id }}
          CHANNEL_ID: ${{ github.event.client_payload.channel_id }}

  status-failure:
    runs-on: ubuntu-latest
    needs: [prepare, render, merge]
    if: always() && (needs.prepare.result == 'failure' || needs.prepare.result == 'cancelled' || needs.render.result == 'failure' || needs.render.result == 'cancelled' || needs.merge.result == 'failure' || needs.merge.result == 'cancelled')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Update job failed
        run: node scripts/update-job.js --status=failed --error="Pipeline failed or was cancelled. Check Actions logs."
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
          JOB_ID: ${{ github.event.client_payload.job_id }}
          CHANNEL_ID: ${{ github.event.client_payload.channel_id }}
