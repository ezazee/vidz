name: AI Pipeline

on:
  repository_dispatch:
    types: [run_ai_pipeline]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm ci

      - name: Run AI Pipeline Locally
        env:
          DATABASE_URL: ${{ github.event.client_payload.db_url }}
          AI_API_KEY: ${{ github.event.client_payload.ai_key }}
          AI_MODEL: ${{ github.event.client_payload.ai_model }}
          AI_BASE_URL: ${{ github.event.client_payload.ai_base }}
        run: |
          npx tsx scripts/run-pipeline.ts ${{ github.event.client_payload.project_id }}
          
      - name: Trigger Generate Render
        run: |
          curl -sSf -X POST "${{ github.event.client_payload.base_url }}/api/projects/${{ github.event.client_payload.project_id }}/generate" \
            -H "Content-Type: application/json" \
            -d '{"mode": "full"}'
