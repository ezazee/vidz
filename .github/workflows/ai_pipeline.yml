name: AI Pipeline

on:
  repository_dispatch:
    types: [run_ai_pipeline]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger Research
        run: |
          curl -sSf -X POST "${{ github.event.client_payload.base_url }}/api/projects/${{ github.event.client_payload.project_id }}/research"
      
      - name: Trigger Director
        run: |
          curl -sSf -X POST "${{ github.event.client_payload.base_url }}/api/projects/${{ github.event.client_payload.project_id }}/director"
        
      - name: Trigger Outline
        run: |
          curl -sSf -X POST "${{ github.event.client_payload.base_url }}/api/projects/${{ github.event.client_payload.project_id }}/outline"
        
      - name: Trigger Scenes (Chunked to bypass 60s limit)
        run: |
          SECTION_INDEX=0
          while true; do
            echo "Generating scenes for section index $SECTION_INDEX..."
            RESPONSE=$(curl -sSf -X POST "${{ github.event.client_payload.base_url }}/api/projects/${{ github.event.client_payload.project_id }}/scenes?sectionIndex=$SECTION_INDEX")
            
            # The API returns remainingSections which is total - 1 - sectionIndex
            # If we don't have jq, we can just grep it, but Github Actions ubuntu-latest has jq
            REMAINING=$(echo "$RESPONSE" | jq -r '.remainingSections')
            echo "Remaining sections: $REMAINING"
            
            if [ "$REMAINING" = "0" ] || [ "$REMAINING" = "null" ]; then
              break
            fi
            SECTION_INDEX=$((SECTION_INDEX + 1))
          done
        
      - name: Trigger Generate
        run: |
          curl -sSf -X POST "${{ github.event.client_payload.base_url }}/api/projects/${{ github.event.client_payload.project_id }}/generate" \
            -H "Content-Type: application/json" \
            -d '{"mode": "full"}'
