name: AI Pipeline

on:
  repository_dispatch:
    types: [run_ai_pipeline]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Warm up AI endpoint
        env:
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: |
          echo "Warming up AI endpoint (Fly.io cold start workaround)..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            -X POST "$AI_BASE_URL/chat/completions" \
            -H "Authorization: Bearer $AI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$AI_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":3}" \
          ) || true
          echo "Warm-up status: HTTP $STATUS"

      - name: Run AI Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          NINE_ROUTER_API_KEY: ${{ secrets.NINE_ROUTER_API_KEY }}
          NINE_ROUTER_BASE_URL: ${{ secrets.NINE_ROUTER_BASE_URL }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          MINIO_REGION: ${{ secrets.MINIO_REGION }}
          MINIO_PUBLIC_URL: ${{ secrets.MINIO_PUBLIC_URL }}
          IMAGE_MODEL: ${{ secrets.IMAGE_MODEL }}
        run: |
          npx tsx --tsconfig tsconfig.json scripts/run-pipeline.ts ${{ github.event.client_payload.project_id }}

      - name: Trigger Generate Render
        run: |
          curl -sSf -X POST "${{ secrets.API_BASE_URL }}/api/projects/${{ github.event.client_payload.project_id }}/generate" \
            -H "Content-Type: application/json" \
            -H "x-api-secret: ${{ secrets.API_SECRET }}" \
            -d '{"mode": "full"}'
